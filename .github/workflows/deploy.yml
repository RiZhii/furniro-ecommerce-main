
name: Deploy Furniro

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy through Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.BASTION_KEY }}
          script: |
            ssh ubuntu@10.0.3.91 << 'EOF'
            whoami
            pwd
            ls -la /home/ubuntu/apps
            ls -la /home/ubuntu/apps/furniro-ecommerce-main
            EOF