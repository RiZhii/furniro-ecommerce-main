apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: nginx-stateful

spec:
  serviceName: nginx-headless

  replicas: 1

  selector:
    matchLabels:
      app: nginx-stateful

  template:
    metadata:
      labels:
        app: nginx-stateful

    spec:
      containers:
        - name: nginx

          image: nginx:latest

          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-storage
              mountPath: /usr/share/nginx/html

  volumeClaimTemplates:
    - metadata:
        name: nginx-storage

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: gp3-storage

        resources:
          requests:
            storage: 1Gi